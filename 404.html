<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    const path = window.location.pathname;
    const repo = "/second-hand";

    sessionStorage.redirect =
      path.replace(repo, "") +
      window.location.search +
      window.location.hash;

    window.location.replace(repo + "/");
  </script>
</head>
<body></body>
</html>
